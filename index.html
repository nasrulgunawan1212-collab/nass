<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semangat Ya, Dea ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff758c,#ff7eb3,#8EC5FC,#E0C3FC);
background-size:400% 400%;
animation:bg 12s ease infinite;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:700px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:40px;
border-radius:25px;
text-align:center;
color:white;
box-shadow:0 15px 35px rgba(0,0,0,.2);
animation:fade 1.5s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-size:45px;
margin-bottom:20px;
}

p{
font-size:20px;
line-height:1.8;
margin-bottom:30px;
}

button{
padding:15px 35px;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff4d6d;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

#message{
margin-top:30px;
font-size:22px;
font-weight:500;
min-height:80px;
}

.heart{
position:absolute;
font-size:20px;
animation:fall linear infinite;
color:white;
opacity:.8;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}
</style>
</head>
<body>

<div class="card">

<h1>Untuk Dea ❤️</h1>

<p>
Kalau hari ini terasa berat,
nggak apa-apa. Kamu nggak harus selalu kuat setiap saat.
Yang penting kamu tetap melangkah sedikit demi sedikit.
</p>

<button onclick="showMessage()">
Klik Kalau Lagi Butuh Semangat 🤍
</button>

<div id="message"></div>

</div>

<script>

const messages=[
"Aku bangga sama kamu. ❤️",
"Kamu sudah hebat sampai sejauh ini.",
"Pelan-pelan saja, semuanya akan membaik.",
"Hari buruk bukan berarti hidupmu buruk.",
"Kamu pantas mendapatkan kebahagiaan.",
"Aku selalu mendukungmu, apa pun yang terjadi.",
"Jangan menyerah ya cantik 😊",
"Kalau capek, istirahat. Jangan menyerah.",
"Senyummu selalu jadi hal favoritku.",
"Aku sayang kamu, Dea ❤️"
];

function showMessage(){

const random=messages[Math.floor(Math.random()*messages.length)];

document.getElementById("message").innerHTML=random;

}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(3+Math.random()*5)+"s";

heart.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,250);

</script>

</body>
</html>
